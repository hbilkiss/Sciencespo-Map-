<!DOCTYPE html>
<html>
<head>
  <title>GeoTag Interactive Mapping Exercise</title>
  <meta charset="utf-8" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
    crossorigin="" />

  <!-- Geocoder CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .sidebar {
      position: absolute;
      left: 0;
      width: 250px;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      height: 100vh;
      padding: 20px;
      font-size: 16px;
      border-right: solid 2px black;
      background-color: #add8e6;
      z-index: 1000;
    }

    .green-heading {
      color: #3D9970;
      text-align: center;
    }

    #map {
      position: fixed;
      right: 0;
      left: 300px;
      top: 0;
      bottom: 0;
    }

    img {
      max-width: 100%;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2 class="green-heading">GeoTag Mapping</h2>

    <center>
      <img src="Sciences-po-coat-of-arms.png" alt="Sciences Po coat of arms" style="width:60%">
    </center>

    <center>
      <h3 style="color: MidnightBlue;">I love interactive maps!</h3>
    </center>

    <h1>Mapping Sciences Po</h1>

    <h2>
      This map highlights the Sciences Po College Universitaire in Paris and my favorite coffee shop during my semester abroad.
    </h2>

    <h3>Try It Yourself</h3>

    <footer>
      <p>
        Share this template! <br>
        https://hbilkiss.github.io/Sciencespo-Map-/
      </p>
    </footer>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
    integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
    crossorigin=""></script>

  <!-- Geocoder JS -->
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <!-- Your custom GeoJSON layer MUST come before setup.js -->
  <script src="js/tyler.js"></script>

  <!-- Main map script -->
  <script src="js/setup.js"></script>

</body>
</html>
